name: Build API Example / Addon

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      type:
        description: 'Build type'
        required: true
        default: 'sdk'
        type: string
  workflow_dispatch:
    inputs:
      type:
        description: 'Build type'
        required: true
        default: 'demo'
        type: choice
        options:
          - demo
          - sdk
  release:
    types: [published]
  pull_request:
    types: [labeled, synchronize]

jobs:
  build-jenkins:
    if: ${{ inputs.type == 'sdk' || (github.event_name == 'release' && github.event.action == 'published') }}
    runs-on: ubuntu-latest
    steps:
      - name: Build
        run: |
          curl -X POST -sS -D- -o/dev/null ${{secrets.JENKINS_BUILD_URL}} \
          -H 'Content-Type: application/json' \
          -d "{\"branch\": \"${{github.ref_name}}\", \"type\": \"sdk\"}"

  build-windows:
    if: ${{ inputs.type == 'demo' || contains(github.event.pull_request.labels.*.name, 'ci:dep-update') }}
    strategy:
      matrix:
        arch: [ia32, x64]
    runs-on: windows-latest
    env:
      npm_config_arch: ${{ matrix.arch }}
      npm_config_agora_electron_arch: ${{ matrix.arch }}
      npm_config_agora_electron_sdk_arch: ${{ matrix.arch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          skip_install: true

      - name: Prepare Build Example
        run: |
          yarn

      - name: Build Example
        run: |
          yarn dist:win --${{ matrix.arch }}
        working-directory: example

      - uses: actions/upload-artifact@v4
        with:
          name: AgoraRtcNgExample-win-${{ matrix.arch }}-${{ github.run_id }}
          path: |
            example/dist/Agora-Electron-API-Example-*-win.zip
          if-no-files-found: error

  build-mac:
    if: ${{ inputs.type == 'demo' || contains(github.event.pull_request.labels.*.name, 'ci:dep-update') }}
    strategy:
      matrix:
        arch: [arm64, x64]
    runs-on: macos-latest
    env:
      npm_config_arch: ${{ matrix.arch }}
      npm_config_agora_electron_arch: ${{ matrix.arch }}
      npm_config_agora_electron_sdk_arch: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          skip_install: true

      - name: Prepare Build Example
        run: |
          yarn
        env:
          USE_HARD_LINKS: false

      - name: Build Example
        run: |
          node scripts/build-example-prepare.js
          yarn dist:mac
        working-directory: example

      - uses: actions/upload-artifact@v4
        with:
          name: AgoraRtcNgExample-mac-${{ matrix.arch }}-${{ github.run_id }}
          path: |
            example/dist/Agora-Electron-API-Example-*-mac.zip
          if-no-files-found: error
  
  build-linux:
    if: ${{ inputs.type == 'demo' || contains(github.event.pull_request.labels.*.name, 'ci:dep-update') }}
    strategy:
      matrix:
        arch: [x64]
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
      env:
        DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential \
            cmake \
            python3 \
            python3-pip \
            python3-dev \
            pkg-config \
            libnss3-dev \
            libatk-bridge2.0-dev \
            libdrm2 \
            libxss1 \
            libasound2-dev \
            libxtst6 \
            libatspi2.0-0 \
            libgtk-3-0 \
            libxrandr2 \
            libasound2 \
            libpangocairo-1.0-0 \
            libatk1.0-0 \
            libcairo-gobject2 \
            libgdk-pixbuf2.0-0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxcursor1 \
            libxi6 \
            libxrender1 \
            libcairo2 \
            libgconf-2-4 \
            libxss1 \
            libgtk2.0-0 \
            libgdk-pixbuf2.0-0 \
            libgtk-3-0 \
            libgbm1

      - uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          skip_install: true

      - name: Prepare Build Example
        run: |
          yarn

      - name: Build Example
        run: |
          yarn dist:linux
        working-directory: example

      - uses: actions/upload-artifact@v4
        with:
          name: AgoraRtcNgExample-linux-${{ matrix.arch }}-${{ github.run_id }}
          path: |
            example/dist/Agora-Electron-API-Example-*.AppImage
          if-no-files-found: error

  notification:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -X POST "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${{ secrets.WECHAT_KEY }}" -d '{"msgtype":"text","text":{"content":"Electron Example:\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\nDownload Link:\nhttps://nightly.link/${{ github.repository }}/actions/runs/${{ github.run_id }}"}}'
